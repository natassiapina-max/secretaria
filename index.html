<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natassia Pina | Psicanalista</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream: #F5F0E8; --dark: #1C1A17; --terracotta: #B5614A; --muted: #8A7F74; --border: #E0D8CC; }
  body { background: var(--cream); color: var(--dark); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  header { width: 100%; padding: 2rem 2rem 1.5rem; text-align: center; border-bottom: 1px solid var(--border); }
  .logo-img { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 0.8rem; display: block; }
  header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem,5vw,2.8rem); font-weight: 300; letter-spacing: 0.12em; }
  header p { margin-top: 0.4rem; font-size: 0.75rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); }
  .chat-wrapper { width: 100%; max-width: 680px; flex: 1; display: flex; flex-direction: column; padding: 0 1rem; }
  .messages { flex: 1; padding: 2rem 0; display: flex; flex-direction: column; gap: 1.2rem; min-height: 400px; max-height: 60vh; overflow-y: auto; scrollbar-width: none; }
  .messages::-webkit-scrollbar { display: none; }
  .msg { display: flex; gap: 0.8rem; animation: fadeUp 0.4s ease forwards; opacity: 0; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width:36px;height:36px;border-radius:50%;background:var(--terracotta);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1rem;color:white;flex-shrink:0;margin-top:2px; }
  .avatar.user-av { background:var(--dark);font-family:'Jost',sans-serif;font-size:0.7rem;letter-spacing:0.05em; }
  .bubble { max-width:78%;padding:1rem 1.2rem;border-radius:2px;line-height:1.65;font-size:0.92rem; }
  .msg.bot .bubble { background:white;border:1px solid var(--border);border-top-left-radius:0; }
  .msg.user .bubble { background:var(--dark);color:var(--cream);border-top-right-radius:0; }
  .typing-bubble { display:flex;gap:5px;padding:1rem 1.2rem;background:white;border:1px solid var(--border);border-radius:2px;border-top-left-radius:0;width:fit-content; }
  .typing-bubble span { width:7px;height:7px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite; }
  .typing-bubble span:nth-child(2){animation-delay:0.2s;}.typing-bubble span:nth-child(3){animation-delay:0.4s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
  .options { display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.3rem;margin-left:44px;animation:fadeUp 0.4s ease 0.2s forwards;opacity:0; }
  .opt-btn { padding:0.55rem 1.1rem;border:1px solid var(--terracotta);background:transparent;color:var(--terracotta);font-family:'Jost',sans-serif;font-size:0.82rem;letter-spacing:0.06em;cursor:pointer;border-radius:2px;transition:all 0.2s; }
  .opt-btn:hover { background:var(--terracotta);color:white; }
  .slot-grid { display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.8rem; }
  .slot-btn { padding:0.5rem 0.9rem;border:1px solid var(--terracotta);background:transparent;color:var(--terracotta);font-family:'Jost',sans-serif;font-size:0.8rem;cursor:pointer;border-radius:2px;transition:all 0.2s; }
  .slot-btn:hover { background:var(--terracotta);color:white; }
  .input-area { border-top:1px solid var(--border);padding:1.2rem 0 2rem;display:flex;gap:0.8rem;align-items:flex-end; }
  .input-area textarea { flex:1;border:1px solid var(--border);background:white;padding:0.85rem 1rem;font-family:'Jost',sans-serif;font-size:0.9rem;font-weight:300;color:var(--dark);resize:none;outline:none;border-radius:2px;line-height:1.5;min-height:48px;max-height:120px;transition:border-color 0.2s; }
  .input-area textarea:focus{border-color:var(--terracotta);}
  .input-area textarea::placeholder{color:var(--muted);}
  .send-btn{width:48px;height:48px;background:var(--terracotta);border:none;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.2s;}
  .send-btn:hover{opacity:0.85;}.send-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .send-btn svg{width:18px;height:18px;fill:white;}
  .pix-box{background:white;border:1px solid var(--border);border-radius:4px;padding:1rem;margin-top:0.8rem;text-align:center;}
  .pix-box-title{font-size:0.75rem;color:var(--muted);margin-bottom:0.8rem;letter-spacing:0.1em;text-transform:uppercase;}
  .pix-box-qr{display:flex;justify-content:center;margin-bottom:0.8rem;}
  .pix-box-code{font-size:0.68rem;color:var(--muted);word-break:break-all;background:var(--cream);padding:0.5rem;border-radius:2px;margin-bottom:0.6rem;text-align:left;}
  .pix-copy-btn{width:100%;padding:0.6rem;background:var(--terracotta);color:white;border:none;border-radius:2px;font-size:0.82rem;cursor:pointer;font-family:'Jost',sans-serif;letter-spacing:0.05em;transition:opacity 0.2s;}
  .pix-copy-btn:hover{opacity:0.85;}
  .confirm-box{background:white;border:1px solid var(--border);border-radius:4px;padding:1rem;margin-top:0.8rem;}
  .confirm-box h3{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;margin-bottom:0.5rem;color:var(--terracotta);}
  .confirm-box p{font-size:0.85rem;color:var(--muted);line-height:1.6;}
  footer{width:100%;text-align:center;padding:1rem;font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;border-top:1px solid var(--border);}
</style>
</head>

// ===== JWT / Google Auth =====
async function getAccessToken() {
  if (accessToken && Date.now() < tokenExpiry) return accessToken;
  const now = Math.floor(Date.now() / 1000);
  const header = btoa(JSON.stringify({alg:'RS256',typ:'JWT'})).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const claim = btoa(JSON.stringify({iss:SA_EMAIL,scope:'https://www.googleapis.com/auth/calendar',aud:'https://oauth2.googleapis.com/token',exp:now+3600,iat:now})).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const unsigned = header + '.' + claim;
  const keyData = SA_KEY.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
  const binaryKey = Uint8Array.from(atob(keyData), c => c.charCodeAt(0));
  const cryptoKey = await crypto.subtle.importKey('pkcs8', binaryKey, {name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'}, false, ['sign']);
  const signature = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', cryptoKey, new TextEncoder().encode(unsigned));
  const sig = btoa(String.fromCharCode(...new Uint8Array(signature))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const jwt = unsigned + '.' + sig;
  const res = await fetch('https://oauth2.googleapis.com/token', {method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`});
  const data = await res.json();
  accessToken = data.access_token;
  tokenExpiry = Date.now() + (data.expires_in - 60) * 1000;
  return accessToken;
}

// ===== Google Calendar =====
async function getAvailableSlots() {
  const token = await getAccessToken();
  const now = new Date();
  const end = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
  const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?timeMin=${now.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`;
  const res = await fetch(url, {headers:{Authorization:`Bearer ${token}`}});
  const data = await res.json();
  const busy = (data.items || []).map(e => ({start: new Date(e.start.dateTime || e.start.date), end: new Date(e.end.dateTime || e.end.date)}));

  // Horários da Natassia: Seg-Sex 19h-21h, Sáb 9h-12h
  const slots = [];
  const d = new Date(now);
  d.setMinutes(0, 0, 0);
  d.setHours(d.getHours() + 1);
  for (let i = 0; i < 200 && slots.length < 8; i++) {
    const day = d.getDay();
    const hour = d.getHours();
    const validSlot = (day >= 1 && day <= 5 && hour >= 19 && hour < 21) ||
                      (day === 6 && hour >= 9 && hour < 12);
    if (validSlot) {
      const slotEnd = new Date(d.getTime() + 60 * 60 * 1000);
      const isBusy = busy.some(b => d < b.end && slotEnd > b.start);
      if (!isBusy) slots.push(new Date(d));
    }
    d.setHours(d.getHours() + 1);
    const newDay = d.getDay();
    const newHour = d.getHours();
    if (newDay >= 1 && newDay <= 5 && newHour >= 21) {
      d.setDate(d.getDate() + 1); d.setHours(9);
    } else if (newDay === 6 && newHour >= 12) {
      d.setDate(d.getDate() + 2); d.setHours(19);
    } else if (newDay === 0) {
      d.setDate(d.getDate() + 1); d.setHours(19);
    }
  }
  return slots;
}

  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email: patientEmail,
      patient_name: patientName,
      appointment_date: appointmentDate,
      modality: modality || 'A definir com Natassia'
    }, EMAILJS_PUBLIC_KEY);
  } catch(e) { console.log('Email não enviado:', e); }
}

async function createEvent(slot, patientName, patientPhone) {
  const token = await getAccessToken();
  const end = new Date(slot.getTime() + 60 * 60 * 1000);
  const event = {
    summary: `Consulta - ${patientName}`,
    description: `Paciente: ${patientName}\nTelefone: ${patientPhone}`,
    start: {dateTime: slot.toISOString(), timeZone: 'America/Sao_Paulo'},
    end: {dateTime: end.toISOString(), timeZone: 'America/Sao_Paulo'}
  };
  const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events`, {
    method:'POST', headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
    body: JSON.stringify(event)
  });
  return res.ok;
}

// ===== UI =====
function scrollBottom() { const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }

function addMsg(role, text, extraEl) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div'); div.className = 'msg ' + role;
  const av = document.createElement('div'); av.className = 'avatar' + (role==='user'?' user-av':''); av.textContent = role==='user'?'Você':'N';
  const bubble = document.createElement('div'); bubble.className = 'bubble';
  if (text) { const p = document.createElement('p'); p.textContent = text; bubble.appendChild(p); }
  if (extraEl) bubble.appendChild(extraEl);
  div.appendChild(av); div.appendChild(bubble); msgs.appendChild(div); scrollBottom();
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div'); div.className='msg bot'; div.id='typing';
  const av = document.createElement('div'); av.className='avatar'; av.textContent='N';
  const b = document.createElement('div'); b.className='typing-bubble'; b.innerHTML='<span></span><span></span><span></span>';
  div.appendChild(av); div.appendChild(b); msgs.appendChild(div); scrollBottom();
}
function hideTyping() { const el = document.getElementById('typing'); if(el) el.remove(); }

function showOptions(opts) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div'); div.className='options'; div.id='opts';
  opts.forEach(opt => {
    const btn = document.createElement('button'); btn.className='opt-btn'; btn.textContent=opt;
    btn.onclick = () => { document.getElementById('opts')?.remove(); document.getElementById('userInput').value=opt; sendMessage(); };
    div.appendChild(btn);
  });
  msgs.appendChild(div); scrollBottom();
}

function showPixBox() {
  const box = document.createElement('div'); box.className='pix-box';
  const title = document.createElement('p'); title.className='pix-box-title'; title.textContent='Pagamento Pix · R$ 300,00'; box.appendChild(title);
  const qrDiv = document.createElement('div'); qrDiv.className='pix-box-qr';
  const qrId = 'qr_'+Date.now(); const qrInner = document.createElement('div'); qrInner.id=qrId;
  qrDiv.appendChild(qrInner); box.appendChild(qrDiv);
  const code = document.createElement('div'); code.className='pix-box-code'; code.textContent=PIX_PAYLOAD; box.appendChild(code);
  const btn = document.createElement('button'); btn.className='pix-copy-btn'; btn.textContent='Copiar código Pix';
  btn.onclick = () => { navigator.clipboard.writeText(PIX_PAYLOAD).then(()=>{ btn.textContent='✅ Copiado!'; setTimeout(()=>btn.textContent='Copiar código Pix',2000); }); };
  box.appendChild(btn);
  setTimeout(()=>{ new QRCode(document.getElementById(qrId),{text:PIX_PAYLOAD,width:160,height:160,colorDark:'#1C1A17',colorLight:'#ffffff'}); },150);
  return box;
}

async function showSlots() {
  showTyping();
  try {
    const slots = await getAvailableSlots();
    hideTyping();
    if (slots.length === 0) { addMsg('bot', 'No momento não há horários disponíveis nos próximos dias. Entre em contato para verificar outras datas.'); return; }
    const grid = document.createElement('div'); grid.className='slot-grid';
    slots.forEach(slot => {
      const btn = document.createElement('button'); btn.className='slot-btn';
      const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
      const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
      btn.textContent = `${days[slot.getDay()]} ${slot.getDate()}/${months[slot.getMonth()]} às ${slot.getHours()}h`;
      btn.onclick = () => selectSlot(slot);
      grid.appendChild(btn);
    });
    addMsg('bot', 'Temos os seguintes horários disponíveis esta semana. Qual prefere?', grid);
  } catch(e) { hideTyping(); addMsg('bot', 'Não consegui verificar a agenda agora. Tente novamente em instantes.'); }
}

function selectSlot(slot) {
  pendingBooking = { slot };
  const days = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const months = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const formatted = `${days[slot.getDay()]}, ${slot.getDate()} de ${months[slot.getMonth()]} às ${slot.getHours()}h`;
  addMsg('user', formatted);
  addMsg('bot', `Ótima escolha! Para confirmar seu horário preciso de algumas informações.\n\nQual é o seu nome completo?`);
}

async function handleBookingFlow(text) {
  if (!pendingBooking.name) {
    pendingBooking.name = text;
    addMsg('bot', `Obrigada, ${text.split(' ')[0]}! E qual é o seu e-mail para enviarmos a confirmação?`);
    return true;
  }
  if (!pendingBooking.email) {
    pendingBooking.email = text;
    addMsg('bot', `Ótimo! E qual é o seu telefone com DDD?`);
    return true;
  }
  if (!pendingBooking.phone) {
    pendingBooking.phone = text;
    showTyping();
    const ok = await createEvent(pendingBooking.slot, pendingBooking.name, pendingBooking.phone);
    hideTyping();
    if (ok) {
      const days = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
      const months = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
      const formatted = `${days[pendingBooking.slot.getDay()]}, ${pendingBooking.slot.getDate()} de ${months[pendingBooking.slot.getMonth()]} às ${pendingBooking.slot.getHours()}h`;
      sendConfirmationEmail(pendingBooking.name, pendingBooking.email, formatted, 'A definir com Natassia');
      const confirmBox = document.createElement('div'); confirmBox.className='confirm-box';
      confirmBox.innerHTML = `<h3>✅ Agendamento confirmado!</h3><p><strong>Paciente:</strong> ${pendingBooking.name}<br><strong>Horário:</strong> ${formatted}<br><strong>Modalidade:</strong> A definir com Natassia</p>`;
      addMsg('bot', 'Perfeito! Sua consulta foi agendada com sucesso. Para garantir sua vaga, realize o pagamento antecipado de R$ 300 via Pix:', confirmBox);
      setTimeout(() => { addMsg('bot', '', showPixBox()); }, 500);
    } else {
      addMsg('bot', 'Ocorreu um problema ao confirmar o agendamento. Por favor, tente novamente.');
    }
    pendingBooking = null;
    return true;
  }
  return false;
}

async function getReply(text) {
  const SYSTEM = `Você é Sofia, secretária virtual da psicanalista Natassia Pina. Seja elegante, acolhedora e humana.

SOBRE NATASSIA PINA:
- Psicanalista e Especialista em Psicopatologia
- Atende EXCLUSIVAMENTE mulheres
- Temas: ansiedade, conflitos internos, relacionamentos, luto, vazio emocional
- Presencial: Espaço HumanoPro, R. Néo Alves Martins, 3176, Sala 62, Zona 03, Maringá
- Online: todo o Brasil e brasileiras no exterior
- Horários: segunda a sexta, 8h às 20h
- Valor: R$ 300 (presencial e online) — pagamento antecipado via Pix
- Não atende planos de saúde

REGRAS:
1. Seja acolhedora. Muitas mulheres chegam em momentos difíceis.
2. NUNCA diga que a agenda está vazia. Sempre "disponibilidade limitada".
3. Faça 1 ou 2 perguntas antes de falar em horários.
4. Quando a pessoa quiser agendar, responda APENAS: MOSTRAR_HORARIOS
5. Respostas curtas e humanas — máximo 3 parágrafos.`;

  history.push({role:'user',content:text});
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':CLAUDE_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:SYSTEM,messages:history})
  });
  const data = await res.json();
  const reply = data.content[0].text;
  history.push({role:'assistant',content:reply});
  return reply;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || loading) return;
  document.getElementById('opts')?.remove();
  input.value = ''; input.style.height = 'auto';
  loading = true; document.getElementById('sendBtn').disabled = true;
  addMsg('user', text);

  // Handle booking flow
  if (pendingBooking) {
    await handleBookingFlow(text);
    loading = false; document.getElementById('sendBtn').disabled = false;
    return;
  }

  showTyping();
  try {
    const reply = await getReply(text);
    hideTyping();
    if (reply.includes('MOSTRAR_HORARIOS')) {
      await showSlots();
    } else {
      addMsg('bot', reply);
      const lower = reply.toLowerCase();
      if (!lower.includes('agendar') && !lower.includes('horário')) {
        showOptions(['Quero agendar','Como funciona?','Qual o valor?','Atende online?']);
      }
    }
  } catch(e) {
    hideTyping(); addMsg('bot','Desculpe, tive um problema técnico. Tente novamente.');
  }
  loading = false; document.getElementById('sendBtn').disabled = false;
}

document.getElementById('userInput').addEventListener('input', function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
document.getElementById('userInput').addEventListener('keydown', function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});

async function init() {
  showTyping();
  await new Promise(r=>setTimeout(r,1200));
  hideTyping();
  const greeting = 'Olá, seja bem-vinda. Sou Sofia, assistente da Natassia Pina. Estou aqui para ajudá-la com informações sobre o processo analítico e agendamentos.\n\nO que trouxe você até aqui hoje?';
  addMsg('bot', greeting);
  history.push({role:'assistant',content:greeting});
  showOptions(['Quero agendar uma sessão','Como funciona a psicanálise?','Qual o valor?','Atende online?']);
}
init();
</script>
